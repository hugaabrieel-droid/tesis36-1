<style>
#preloader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#1a120b;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  transition:opacity .8s ease;
}
.loader-circle{
  width:90px;height:90px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.loader-circle::before{
  content:"";
  position:absolute;
  width:90px;height:90px;
  border-radius:50%;
  border-top:3px solid #f2c94c;
  border-right:3px solid transparent;
  animation:spin 1s linear infinite;
}
#loading-number{
  color:#fff8e1;
  font-size:18px;
}
.loader-text{
  margin-top:15px;
  color:#f2c94c;
  letter-spacing:3px;
  font-size:13px;
  opacity:.8;
}
@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>

<div id="preloader">
  <div class="loader-circle">
    <div id="loading-number">0%</div>
  </div>
  <div class="loader-text">LOADING</div>
</div>

<script>
let p=0;
let i=setInterval(()=>{
  p++;
  document.getElementById("loading-number").innerText=p+"%";
  if(p>=100){
    clearInterval(i);
    let el=document.getElementById("preloader");
    el.style.opacity="0";
    setTimeout(()=>{el.style.display="none";},800);
  }
},20);
</script>

<style>
:root{
  --bg:#1a120b;
  --text:#fff8e1;
}
body{
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
}
body.light{
  --bg:#fff8e1;
  --text:#1a120b;
}
.theme-toggle{
  position:fixed;
  top:20px;
  right:20px;
  z-index:999;
}
.switch{
  width:64px;
  height:32px;
  background:#3a2a1a;
  border-radius:50px;
  position:relative;
  cursor:pointer;
  transition:0.3s;
  display:flex;
  align-items:center;
  padding:0 6px;
}
.icon{
  font-size:14px;
  z-index:2;
}
.icon.sun{ margin-left:auto; opacity:.4; }
.icon.moon{ margin-right:auto; opacity:1; }
.knob{
  position:absolute;
  width:26px;
  height:26px;
  background:#f2c94c;
  border-radius:50%;
  top:3px;
  left:3px;
  transition:transform 0.35s ease;
}
body:not(.light) .knob{
  transform:translateX(32px);
}
body.light .switch{
  background:#ddd2b0;
}
body.light .knob{
  transform:translateX(0);
  background:#1a120b;
}
body.light .icon.sun{ opacity:1; }
body.light .icon.moon{ opacity:.4; }
</style>

<div class="theme-toggle">
  <div class="switch" onclick="toggleTheme()">
    <span class="icon moon">🌙</span>
    <span class="icon sun">☀️</span>
    <div class="knob"></div>
  </div>
</div>

<script>
function toggleTheme(){
  let isLight=document.body.classList.toggle("light");
  localStorage.setItem("theme", isLight ? "light" : "dark");
}
(function(){
  let saved=localStorage.getItem("theme");
  if(saved){
    document.body.classList.toggle("light", saved==="light");
  }
})();
</script>
