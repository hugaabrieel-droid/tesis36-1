<style>
#preloader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#1a120b;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  transition:opacity .8s ease;
}
.loader-circle{
  width:90px;height:90px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.loader-circle::before{
  content:"";
  position:absolute;
  width:90px;height:90px;
  border-radius:50%;
  border-top:3px solid #f2c94c;
  border-right:3px solid transparent;
  animation:spin 1s linear infinite;
}
#loading-number{
  color:#fff8e1;
  font-size:18px;
}
.loader-text{
  margin-top:15px;
  color:#f2c94c;
  letter-spacing:3px;
  font-size:13px;
  opacity:.8;
}
@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>

<div id="preloader">
  <div class="loader-circle">
    <div id="loading-number">0%</div>
  </div>
  <div class="loader-text">LOADING</div>
</div>

<script>
let p=0;
let i=setInterval(()=>{
  p++;
  document.getElementById("loading-number").innerText=p+"%";
  if(p>=100){
    clearInterval(i);
    let el=document.getElementById("preloader");
    el.style.opacity="0";
    setTimeout(()=>{el.style.display="none";},800);
  }
},20);
</script>

<style>
:root{
  --bg:#ffffff;
  --text:#111111;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:background .3s,color .3s;
}

.dark{
  --bg:#1a120b;
  --text:#fff8e1;

#toggle{
  position:fixed;
  top:20px;
  right:20px;
  background:#f2c94c;
  color:#1a120b;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  z-index:999;
}
</style>

<button id="toggle">🌙</button>

<script>
const btn=document.getElementById("toggle");
const saved=localStorage.getItem("theme");

if(saved==="dark"){
  document.body.classList.add("dark");
  btn.innerText="☀️";
}

btn.onclick=()=>{
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    localStorage.setItem("theme","dark");
    btn.innerText="☀️";
  }else{
    localStorage.setItem("theme","light");
    btn.innerText="🌙";
  }
};
</script>
