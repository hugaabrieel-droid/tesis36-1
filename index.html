<style>
#preloader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#1a120b;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  transition:opacity .6s ease;
}
.loader-circle{
  width:90px;height:90px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.loader-circle::before{
  content:"";
  position:absolute;
  width:90px;height:90px;
  border-radius:50%;
  border-top:3px solid #f2c94c;
  border-right:3px solid transparent;
  animation:spin 1s linear infinite;
}
#loading-number{
  color:#fff8e1;
  font-size:18px;
}
.loader-text{
  margin-top:15px;
  color:#f2c94c;
  letter-spacing:3px;
  font-size:13px;
}
@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>

<div id="preloader">
  <div class="loader-circle">
    <div id="loading-number">0%</div>
  </div>
  <div class="loader-text">NUNGGU NIH</div>
</div>

<script>
let p=0;
let done=false;

let i=setInterval(()=>{
  if(p<90){
    p++;
    document.getElementById("loading-number").innerText=p+"%";
  }
},20);

window.addEventListener("load",()=>{
  done=true;
  clearInterval(i);

  let count=setInterval(()=>{
    if(p<100){
      p++;
      document.getElementById("loading-number").innerText=p+"%";
    }else{
      clearInterval(count);

      let el=document.getElementById("preloader");
      el.style.opacity="0";

      setTimeout(()=>{
        el.style.display="none";
      },500);
    }
  },10);
});
</script>
