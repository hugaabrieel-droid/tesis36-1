<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tes</title>

<style>
body{margin:0}

/* PRELOADER */
#preloader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#1a120b;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity .5s;
}

/* TOGGLE */
#toggleWrap{
  position:fixed;
  top:20px;
  right:20px;
  z-index:10000;
}
#toggleWrap input{display:none;}
#toggleWrap label{
  width:50px;height:26px;
  background:#888;
  border-radius:50px;
  display:block;
  position:relative;
  cursor:pointer;
}
#toggleWrap label::before{
  content:"";
  width:22px;height:22px;
  background:#fff;
  position:absolute;
  top:2px;left:2px;
  border-radius:50%;
  transition:.3s;
}
#toggleWrap input:checked + label{
  background:#f2c94c;
}
#toggleWrap input:checked + label::before{
  transform:translateX(24px);
}

/* DARK */
.dark{
  background:#1a120b;
  color:#fff8e1;
}
</style>
</head>

<body>

<div id="preloader"></div>

<div id="toggleWrap">
  <input type="checkbox" id="t">
  <label for="t"></label>
</div>

<h1 style="padding:100px">WEBSITE KAMU</h1>

<script>
/* PRELOADER FIX */
window.onload=function(){
  let p=document.getElementById("preloader");
  p.style.opacity="0";
  setTimeout(()=>{p.style.display="none";},500);
};

/* TOGGLE FIX */
let t=document.getElementById("t");

if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
  t.checked=true;
}

t.onchange=function(){
  if(t.checked){
    document.body.classList.add("dark");
    localStorage.setItem("theme","dark");
  }else{
    document.body.classList.remove("dark");
    localStorage.setItem("theme","light");
  }
};
</script>

</body>
</html>
