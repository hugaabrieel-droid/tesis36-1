<style>
:root{
  --bg:#ffffff;
  --text:#111111;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  transition:background .3s,color .3s;
}

/* DARK MODE */
.dark{
  --bg:#1a120b;
  --text:#fff8e1;
}

/* WRAPPER */
.theme-toggle{
  position:fixed;
  top:20px;
  right:20px;
  z-index:10000;
}

/* HIDE INPUT */
.theme-toggle input{
  display:none;
}

/* SWITCH BG */
.switch{
  width:52px;
  height:28px;
  background:#555;
  border-radius:50px;
  position:relative;
  cursor:pointer;
  transition:background .3s;
}

/* BULATAN */
.switch::before{
  content:"";
  position:absolute;
  width:22px;
  height:22px;
  top:3px;
  left:3px;
  background:#fff;
  border-radius:50%;
  transition:transform .3s;
}

/* POSISI KANAN = DARK */
.theme-toggle input:checked + .switch{
  background:#f2c94c;
}

.theme-toggle input:checked + .switch::before{
  transform:translateX(24px);
}
</style>

<div class="theme-toggle">
  <input type="checkbox" id="toggle">
  <label for="toggle" class="switch"></label>
</div>

<script>
const toggle=document.getElementById("toggle");
const saved=localStorage.getItem("theme");

/* Default: LIGHT (kiri) */
if(saved==="dark"){
  document.body.classList.add("dark");
  toggle.checked=true; // kanan
}

toggle.addEventListener("change",()=>{
  if(toggle.checked){
    document.body.classList.add("dark"); // kanan = dark
    localStorage.setItem("theme","dark");
  }else{
    document.body.classList.remove("dark"); // kiri = light
    localStorage.setItem("theme","light");
  }
});
</script>
