<style>
#preloader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#1a120b;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  opacity:1;
  transition:opacity .6s ease;
}

/* spinner */
.loader{
  width:50px;
  height:50px;
  border:3px solid rgba(255,255,255,.1);
  border-top:3px solid #f2c94c;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>

<div id="preloader">
  <div class="loader"></div>
</div>

<script>
window.addEventListener("load",()=>{
  let p=document.getElementById("preloader");

  setTimeout(()=>{
    p.style.opacity="0";

    setTimeout(()=>{
      p.style.display="none";
    },600);

  },800); // biar keliatan dulu
});
</script>
